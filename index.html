<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>d-friend</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #pet {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      transform-origin: 50% 100%;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347, #ff6f61);
      box-shadow: 0 4px 12px rgba(255, 111, 97, 0.4);
      cursor: grab;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #pet[data-behavior="petting"] {
      background: radial-gradient(circle, #f8a0c8, #e8709a);
      box-shadow: 0 4px 12px rgba(232, 112, 154, 0.5);
    }
    #pet[data-behavior="idle"] {
      animation: idle-breathing 2.4s ease-in-out infinite;
    }
    #pet[data-behavior="drag"] {
      cursor: grabbing;
    }
    @keyframes idle-breathing {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 4px 12px rgba(255, 111, 97, 0.4);
      }
      45% {
        transform: scaleX(1.08) scaleY(0.94);
        box-shadow: 0 8px 18px rgba(255, 111, 97, 0.55);
      }
      70% {
        transform: scaleX(0.98) scaleY(1.04);
        box-shadow: 0 3px 10px rgba(255, 111, 97, 0.35);
      }
    }
  </style>
</head>
<body>
  <div id="pet"></div>
  <script type="module" src="./src/renderer.ts"></script>
</body>
</html>
