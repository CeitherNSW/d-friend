<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>d-friend</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #pet {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347, #ff6f61);
      box-shadow: 0 4px 12px rgba(255, 111, 97, 0.4);
      cursor: grab;
    }
  </style>
</head>
<body>
  <div id="pet"></div>
  <script type="module" src="./src/renderer.ts"></script>
</body>
</html>
