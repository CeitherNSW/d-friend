<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>d-friend</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #pet {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform-origin: 50% 100%;
      width: 96px;
      height: 168px;
      cursor: grab;
      overflow: visible;
      filter: drop-shadow(0 6px 10px rgba(70, 35, 20, 0.24));
      transition: filter 0.2s ease;
    }
    #pet[data-behavior="petting"] {
      filter: drop-shadow(0 8px 14px rgba(232, 112, 154, 0.45));
    }
    #pet[data-behavior="idle"] {
      animation: idle-breathing 2.4s ease-in-out infinite;
    }
    #pet[data-behavior="drag"] {
      cursor: grabbing;
    }
    #pet .pet-sprite-frame {
      display: block;
      image-rendering: auto;
      transform-origin: 50% 50%;
    }
    #pet[data-direction="right"] .pet-sprite-frame {
      transform: scaleX(-1);
    }
    @keyframes idle-breathing {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 6px 10px rgba(70, 35, 20, 0.24));
      }
      45% {
        transform: scaleX(1.04) scaleY(0.97);
        filter: drop-shadow(0 9px 14px rgba(70, 35, 20, 0.3));
      }
      70% {
        transform: scaleX(0.99) scaleY(1.02);
        filter: drop-shadow(0 5px 8px rgba(70, 35, 20, 0.2));
      }
    }
  </style>
</head>
<body>
  <div id="pet"></div>
  <script type="module" src="./src/renderer.ts"></script>
</body>
</html>
